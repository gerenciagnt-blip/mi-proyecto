name: Cobros — generación mensual

# Corre el día 1 de cada mes a las 05:00 UTC (≈ 00:00 Colombia) generando
# el cobro del MES ANTERIOR para cada sucursal con tarifas configuradas.
# También disparable manualmente.
on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:
    inputs:
      periodo:
        description: 'Período a generar (YYYY-MM) — default: mes anterior'
        required: false
        type: string

jobs:
  generar-cobros:
    name: Generar cobros del período
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate DATABASE_URL shape
        env:
          DATABASE_URL_RAW: ${{ secrets.DATABASE_URL }}
        run: |
          if ! printf '%s' "$DATABASE_URL_RAW" | grep -qE '^"?postgres(ql)?://'; then
            echo "::error::El secret DATABASE_URL no es válido."
            exit 1
          fi

      - name: Run cobros:generar
        working-directory: apps/cli
        env:
          DATABASE_URL_RAW: ${{ secrets.DATABASE_URL }}
        run: |
          DB="$DATABASE_URL_RAW"
          DB="${DB%\"}"; DB="${DB#\"}"; DB="${DB## }"; DB="${DB%% }"
          export DATABASE_URL="$DB"
          if [ -n "${{ inputs.periodo }}" ]; then
            pnpm exec tsx src/index.ts cobros:generar --periodo "${{ inputs.periodo }}"
          else
            pnpm exec tsx src/index.ts cobros:generar
          fi
