name: Retention 120d (daily)

# Corre todos los días a las 4 AM UTC (≈ 11 PM Colombia el día anterior)
# También se puede disparar manualmente desde la UI de Actions.
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      dry:
        description: 'Dry run (solo cuenta, no borra)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  retention:
    name: Limpieza incapacidades + soporte-af
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UPLOADS_DIR: ${{ secrets.UPLOADS_DIR || './uploads' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Debug secret shape
        env:
          DATABASE_URL_RAW: ${{ secrets.DATABASE_URL }}
        run: |
          echo "length=${#DATABASE_URL_RAW}"
          echo "first_char_codepoint=$(printf '%s' "$DATABASE_URL_RAW" | head -c 1 | od -An -c | tr -d ' ')"
          echo "starts_with_postgresql=$(printf '%s' "$DATABASE_URL_RAW" | grep -c '^postgresql://')"
          echo "has_leading_quote=$(printf '%s' "$DATABASE_URL_RAW" | grep -c '^\"')"
          echo "has_leading_space=$(printf '%s' "$DATABASE_URL_RAW" | grep -c '^ ')"

      - name: Run retention job
        working-directory: apps/cli
        env:
          DATABASE_URL_RAW: ${{ secrets.DATABASE_URL }}
        run: |
          DB="$DATABASE_URL_RAW"
          DB="${DB%\"}"
          DB="${DB#\"}"
          DB="${DB## }"   # strip leading space
          DB="${DB%% }"   # strip trailing space
          export DATABASE_URL="$DB"
          if [ "${{ inputs.dry }}" = "true" ]; then
            pnpm exec tsx src/index.ts retention:run --dry
          else
            pnpm exec tsx src/index.ts retention:run
          fi
