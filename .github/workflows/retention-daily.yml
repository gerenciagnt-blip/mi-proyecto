name: Retention 120d (daily)

# Corre todos los días a las 4 AM UTC (≈ 11 PM Colombia el día anterior)
# También se puede disparar manualmente desde la UI de Actions.
on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      dry:
        description: 'Dry run (solo cuenta, no borra)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  retention:
    name: Limpieza incapacidades + soporte-af
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      UPLOADS_DIR: ${{ secrets.UPLOADS_DIR || './uploads' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      # Verificación temprana: si el secret DATABASE_URL no empieza con
      # postgresql:// (porque fue guardado mal), falla con mensaje claro
      # en vez de dejar que Prisma tire un error críptico de schema.
      - name: Validate DATABASE_URL shape
        env:
          DATABASE_URL_RAW: ${{ secrets.DATABASE_URL }}
        run: |
          if ! printf '%s' "$DATABASE_URL_RAW" | grep -qE '^"?postgres(ql)?://'; then
            echo "::error::El secret DATABASE_URL no empieza con postgresql:// (longitud=${#DATABASE_URL_RAW}). Re-edita el secret en GitHub → Settings → Secrets."
            exit 1
          fi
          echo "✓ DATABASE_URL tiene forma válida (longitud=${#DATABASE_URL_RAW})"

      - name: Run retention job
        working-directory: apps/cli
        env:
          DATABASE_URL_RAW: ${{ secrets.DATABASE_URL }}
        run: |
          DB="$DATABASE_URL_RAW"
          DB="${DB%\"}"
          DB="${DB#\"}"
          DB="${DB## }"   # strip leading space
          DB="${DB%% }"   # strip trailing space
          export DATABASE_URL="$DB"
          if [ "${{ inputs.dry }}" = "true" ]; then
            pnpm exec tsx src/index.ts retention:run --dry
          else
            pnpm exec tsx src/index.ts retention:run
          fi
